[www]
user = www-data
group = www-data

listen = 9000
listen.owner = www-data
listen.group = www-data

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

request_terminate_timeout = 1800s
request_slowlog_timeout = 60s
catch_workers_output = yes
clear_env = no

php_admin_flag[log_errors] = on
